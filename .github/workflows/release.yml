name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.0.0)'
        required: true
        default: '2.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: extract version from tag (v2.0.0 -> 2.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Manual dispatch: use input
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller filesearch.spec --clean --noconfirm

      - name: Rename EXE with version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp dist/FileSearch.exe "dist/FileSearch-v${VERSION}.exe"
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FileSearch v${{ steps.version.outputs.version }}
          body: |
            ## FileSearch v${{ steps.version.outputs.version }}

            ### 🚀 真多核索引：绕过 GIL（v2.5.0 头条优化）
            - 解析+分词改用 `ProcessPoolExecutor` 真多核并行（替换 `ThreadPoolExecutor`，后者因 GIL 实际并行度≈1x）
            - 模块级 worker 进程并行预加载 jieba 词典；`wait(FIRST_COMPLETED)` 有界提交，避免大语料结果堆积
            - `main.py` 增加 `freeze_support()`，修复 Windows 打包后子进程 spawn 问题
            - 崩溃文件隔离在子进程，`BrokenProcessPool` 干净报错而非卡死

            ### ⚡ 解析器加速（re.findall 替代 Python 字节循环）
            - doc / ppt / xls 旧版 OLE 文档：UTF-16LE 文本段与 ASCII/GBK 文本段改用预编译正则 `re.findall`（C 实现），单文件解析提速 10-50x
            - PDF：200 页上限防超大文件拖垮索引；仅当 `extract_text()` 为空时才回退 `extract_tables()`（极慢）

            ### 其他更新
            - `file_contents` 存储截断到 2M 字符，与分词/搜索范围一致（DB 体积下降，snippet 无 gap）
            - 修复 v1→v2 迁移中 `COALESFC` typo（原被 try/except 吞掉，导致 FTS 内容重建静默失败）
            - 新增 txt / md / 代码（.py .js .ts .java .c .cpp .h .css .html .json .xml .yaml .sql .sh .bat 等）解析器
            - 索引管理抽屉文件类型选择改为 QGridLayout 多列换行，避免扩展名增多后横向溢出

            ### 使用说明
            1. 下载 `FileSearch-v${{ steps.version.outputs.version }}.exe`
            2. 双击运行即可使用
            3. 首次使用请先点击「索引管理」创建索引
          files: |
            dist/FileSearch-v${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
