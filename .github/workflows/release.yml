name: Build & Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.0.0)'
        required: true
        default: '2.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: extract version from tag (v2.0.0 -> 2.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Manual dispatch: use input
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller filesearch.spec --clean --noconfirm

      - name: Rename EXE with version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp dist/FileSearch.exe "dist/FileSearch-v${VERSION}.exe"
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FileSearch v${{ steps.version.outputs.version }}
          body: |
            ## FileSearch v${{ steps.version.outputs.version }}

            ### 🚀 索引速度大幅提升（v2.4.0 关键优化）
            - `batch_insert_files_with_ids` 改用 `executemany`（写入速度提升 10-50x）
            - 索引期间 `PRAGMA synchronous=OFF`（写入速度提升 2-3x）
            - 更新文件采用"标记旧记录无效 + 插入新记录"策略（避免 FTS5 DELETE 重分词开销）
            - 分词前内容截断至 2M 字符（避免超大文件分词过慢）
            - 批量大小从 200 提升到 500（减少事务次数）
            - 索引结束运行 FTS5 optimize 合并 B-Tree 碎片

            ### 其他更新
            - 🔧 索引管理抽屉 UI 修复（v2.3.1）
            - 🎨 明亮暖白主题 UI

            ### 使用说明
            1. 下载 `FileSearch-v${{ steps.version.outputs.version }}.exe`
            2. 双击运行即可使用
            3. 首次使用请先点击「索引管理」创建索引
          files: |
            dist/FileSearch-v${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
